version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: amodel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"

  serverless-redis-http:
    image: hiett/serverless-redis-http:latest
    restart: always
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TOKEN: local-dev-token
    ports:
      - "8079:80"
    depends_on:
      - redis

volumes:
  postgres_data:
